version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dl-app-api
    restart: unless-stopped
    ports:
      - "8040:8040"
    env_file:
      - .env
    environment:
      - NODE_ENV=\${NODE_ENV:-production}
      - PORT=\${PROD_PORT:-8040}
    mem_limit: 512m
    networks:

      - dl-app-shared-network

networks:
  dl-app-shared-network:
    external: true
